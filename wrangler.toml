name = "gemini-toolkit"
main = "worker/src/index.ts"
compatibility_date = "2024-06-20"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./frontend/dist"

[[d1_databases]]
binding = "DB"
database_name = "gemini-toolkit-db"
database_id = "d748668f-6224-450d-9d78-67f545ad533a"

# R2 bucket for evidence photos (enable R2 in Cloudflare dashboard first)
# [[r2_buckets]]
# binding = "EVIDENCE_BUCKET"
# bucket_name = "gemini-toolkit-evidence"

[vars]
ENVIRONMENT = "production"
APP_NAME = "GeminiToolKit"
SESSION_TTL_SECONDS = "86400"
MAX_UPLOAD_SIZE_BYTES = "15728640"
